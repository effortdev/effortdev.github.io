about_profile_image: images/ktj.jpeg
about_content: |
  Java/Spring을 중심으로 백엔드 개발 경험을 쌓아오고 있습니다. 하나의 기술에 안주하지 않고 새로운 것을 꾸준히 익히며, 배운 것을 실제 서비스에 적용해보는 과정에서 가장 큰 보람을 느낍니다. 
  기술은 결국 문제를 해결하기 위한 도구라는 생각으로, 상황에 맞는 기술을 선택하고 적용하는 능력을 키워가고 있습니다.

  현재는 성능과 안정성에 관심이 많아, 더 빠르고 효율적인 시스템을 만들기 위한 방법들을 탐구하고 있습니다. 
  단순히 돌아가는 코드보다 더 나은 구조를 고민하고, 실제로 체감할 수 있는 개선을 만들어내는 개발자가 되고 싶습니다.

  문서화의 힘을 믿고, 팀원 누구나 맥락을 공유할 수 있도록 기록을 남기는 것을 습관으로 삼고 있습니다. 
  사람들과 잘 어우러지며 협업하는 것을 즐기고, 좋은 팀 안에서 함께 성장하는 개발 문화를 만들어가고 싶습니다.

