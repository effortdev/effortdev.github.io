        quote: >
          React 기반 웹 서비스 개발팀 인턴으로 협업 문화 경험
        description: |
          - 코드 리뷰 참여를 통한 실무 코드 품질 기준 및 협업 방식 습득
          - Git/GitHub 기반 협업 워크플로우 실무 적용

      - layout: left
        title: IoT 스타트업
        sub_title: Backend Engineer
        caption: 2023. 06 ~ 2024. 08
        quote: >
          IoT 기반 서비스 백엔드 개발 및 농업·환경 도메인 R&D 과제 참여
        description: |
          - MQTT 통신을 활용한 IoT 디바이스 실시간 데이터 수집 및 시각화 개발
          - 회사 웹사이트 제작 및 유지보수
          - 농업·환경 도메인 R&D 사업 웹 시스템 설계 및 개발 참여

  - title: 프로젝트
    layout: list
    content:
      - layout: top-left
        title: Beanst
        sub_title: 호텔 예약 시스템 (팀 프로젝트 · 5인 · 2주)
        caption: DynamicWeb · JSP · jQuery
        quote: >
          웹 서비스의 기본 동작 원리를 직접 구현하며 익힌 호텔 예약 플랫폼
        description: |
          - DB 설계 전반 담당 및 테이블 간 외래키 관계 정의
          - 회원가입 / 로그인 기능 구현 (세션 기반 인증)
          - 객실 예약 프로세스 설계 및 개발
          - 관리자 페이지 회원 관리 기능 개발
          - 프로젝트를 통해 HTTP 요청/응답 흐름, DB 연동 등
            웹 서비스의 기본 동작 원리를 깊이 이해

      - layout: top-left
        title: 부동산 실거래 조회 서비스
        sub_title: 개인 프로젝트
        caption: Spring Boot · React · Docker · GitHub Actions · Azure · Vercel
        link: realelstate.vercel.app
        link_text: 사이트 방문
        quote: >
          공공데이터 기반 아파트 실거래 정보를 시각화하는 웹 서비스
        description: |
          - 공공데이터 API를 활용한 지역별 아파트 실거래 데이터 수집 및 제공
          - 거래 지표 및 거래 금액 차트 시각화
          - 네이버 지도 API를 활용한 매물 위치 표시
          - Azure 서버(1 CPU, 1GB RAM) 배포 환경에서 서버 사양 한계를
            경험하고, 프론트엔드를 Vercel로 분리하여 안정성 확보
          - Docker 컨테이너화 및 GitHub Actions를 통한 CI/CD 자동화 구축

      - layout: top-left
        title: 우주 쓰레기 실시간 관제 시스템
        sub_title: 개인 프로젝트 (진행 예정)
        caption: Spring Boot · React · Redis · Spring Batch · Docker · GitHub Actions
        quote: >
